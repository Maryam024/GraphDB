<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniGraphDB - A Neo4j-like Graph Database</title>
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="bg-dark py-3 mb-4">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-center">
                <h1 class="fs-4 me-auto text-white">MiniGraphDB</h1>
                <span class="badge bg-info">Neo4j-like Cypher Implementation</span>
            </div>
        </div>
    </header>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-light py-3 mt-5">
        <div class="container text-center">
            <p class="mb-1">MiniGraphDB - A Neo4j-like Graph Database with Cypher Support</p>
            <p class="text-muted mb-0 small">Built with Flask, JavaScript, and Bootstrap</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
